<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeliaAI - Entorno de Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; background-color: #343541; color: #ececf1; height: 100vh; }
        
        /* BARRA LATERAL MODIFICADA */
        #sidebar { width: 260px; background-color: #202123; padding: 10px; display: flex; flex-direction: column; }
        
        /* 3. NUEVOS ESTILOS PARA EL PANEL CON IMAGEN */
        .new-chat { 
            border: 1px solid #4d4d4f; 
            padding: 10px 12px; 
            border-radius: 5px; 
            display: flex;
            align-items: center;
            gap: 10px; /* Espacio entre la foto y el texto */
            cursor: pointer; 
            transition: 0.3s; 
        }
        .new-chat:hover { background-color: #2a2b32; }
        
        /* Estilo para la foto del panel lateral */
        .panel-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%; /* Redonda */
            object-fit: cover;
            border: 1px solid #565869;
            flex-shrink: 0;
        }
        .panel-text {
            font-size: 14px;
            font-weight: 500;
        }
        
        #chat-container { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        
        /* 1. SECCIÓN SUPERIOR: BANNER DE DELIA */
        #top-banner {
            width: 100%;
            height: 120px;
            background-color: #202123;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid #4d4d4f;
        }
        .banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }
        .banner-title {
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* ÁREA DE MENSAJES */
        #messages { flex: 1; overflow-y: auto; padding: 20px 20% 100px 20%; display: flex; flex-direction: column; gap: 20px; }
        
        /* CONTENEDOR PARA EL AVATAR LATERAL EN CHAT */
        .message { display: flex; gap: 15px; padding: 20px; border-radius: 8px; max-width: 85%; line-height: 1.6; }
        .user { background-color: #343541; align-self: flex-end; color: #ececf1; }
        .bot { background-color: #444654; align-self: flex-start; border: 1px solid #4d4d4f; }
        
        /* 2. DISEÑO DEL AVATAR FOTO LATERAL EN CHAT */
        .avatar-lateral {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #565869;
            flex-shrink: 0;
        }
        .message-content {
            flex: 1;
        }

        #input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 20%; background: linear-gradient(transparent, #343541 30%); }
        .input-box { display: flex; background-color: #40414f; border-radius: 12px; border: 1px solid #565869; box-shadow: 0 0 15px rgba(0,0,0,0.1); padding: 10px; }
        textarea { flex: 1; background: none; border: none; color: white; resize: none; height: 24px; outline: none; font-size: 16px; }
        button { background: none; border: none; color: #19c37d; cursor: pointer; padding: 0 8px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <!-- 3. AQUÍ APARECE LA TERCERA FOTO (PANEL LATERAL) apuntando a tu carpeta -->
        <div class="new-chat">
            <!-- REEMPLAZA 'panel.jpg' por el nombre de la foto que quieras usar para el botón -->
            <img src="neo/imag/panel.jpg" alt="Delia Panel" class="panel-avatar">
            <span class="panel-text">DeliaAI Panel</span>
        </div>
    </div>
    
    <div id="chat-container">
        
        <!-- 1. FOTO DE ARRIBA (BANNER) -->
        <div id="top-banner">
            <img src="neo/imag/banner.jpg" alt="Delia Banner" class="banner-img">
            <div class="banner-title">DeliaAI Módulo Activo</div>
        </div>

        <div id="messages">
            <!-- 2. FOTO LATERAL EN EL CHAT -->
            <div class="message bot">
                <img src="neo/imag/perfil.jpg" alt="Delia" class="avatar-lateral">
                <div class="message-content">
                    Hola DEMIAN ALEX3NDER , soy DeliaAI. ¿En qué proyecto técnico o investigación de FILTRACION Y DE CODIFICAR vamos a trabajar hoy?
                </div>
            </div>
        </div>
        
        <div id="input-area">
            <div class="input-box">
                <textarea id="userInput" placeholder="Envía un mensaje..."></textarea>
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
