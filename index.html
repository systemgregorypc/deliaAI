<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeliaAI - Entorno de Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; background-color: #343541; color: #ececf1; height: 100vh; overflow: hidden; }
        
        /* BARRA LATERAL MODIFICADA PARA HACER ESPACIO A LA IMAGEN GRANDE */
        #sidebar { 
            width: 260px; 
            background-color: #202123; 
            padding: 15px 10px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px;
            height: 100vh;
        }
        
        /* Botón superior del Panel */
        .new-chat { 
            border: 1px solid #4d4d4f; 
            padding: 10px 12px; 
            border-radius: 5px; 
            display: flex;
            align-items: center;
            gap: 10px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .new-chat:hover { background-color: #2a2b32; }
        
        .panel-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #565869;
            flex-shrink: 0;
        }
        .panel-text {
            font-size: 14px;
            font-weight: 500;
        }
        
        /* 4. CONTENEDOR NUEVO: IMAGEN GRANDE VIVA DE DELIA */
        .sidebar-live-container {
            flex: 1; /* Ocupa todo el espacio de abajo en la barra lateral */
            width: 100%;
            border-radius: 8px;
            border: 1px solid #3e3f4b;
            background-color: #171717;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        
        .sidebar-live-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Mantiene las proporciones de su figura o rostro sin estirarse */
            display: block;
            opacity: 0.9;
            transition: opacity 0.3s ease;
        }
        
        .sidebar-live-container:hover .sidebar-live-img {
            opacity: 1; /* Se ilumina más cuando el usuario pasa el mouse */
        }

        /* Título interno flotante para la presencia viva */
        .live-status {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            background-color: rgba(25, 195, 125, 0.2);
            border: 1px solid #19c37d;
            color: #19c37d;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        
        #chat-container { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        
        /* 1. SECCIÓN SUPERIOR: BANNER DE DELIA */
        #top-banner {
            width: 100%;
            height: 120px;
            background-color: #202123;
            overflow: hidden;
            position: relative;
            border-bottom: 1px solid #4d4d4f;
        }
        .banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }
        .banner-title {
            position: absolute;
            bottom: 10px;
            left: 20px;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* ÁREA DE MENSAJES */
        #messages { flex: 1; overflow-y: auto; padding: 20px 20% 100px 20%; display: flex; flex-direction: column; gap: 20px; }
        
        .message { display: flex; gap: 15px; padding: 20px; border-radius: 8px; max-width: 85%; line-height: 1.6; }
        .user { background-color: #343541; align-self: flex-end; color: #ececf1; }
        .bot { background-color: #444654; align-self: flex-start; border: 1px solid #4d4d4f; }
        
        /* 2. DISEÑO DEL AVATAR FOTO LATERAL EN CHAT */
        .avatar-lateral {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid #565869;
            flex-shrink: 0;
        }
        .message-content {
            flex: 1;
        }

        #input-area { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 20%; background: linear-gradient(transparent, #343541 30%); }
        .input-box { display: flex; background-color: #40414f; border-radius: 12px; border: 1px solid #565869; box-shadow: 0 0 15px rgba(0,0,0,0.1); padding: 10px; }
        textarea { flex: 1; background: none; border: none; color: white; resize: none; height: 24px; outline: none; font-size: 16px; }
        button { background: none; border: none; color: #19c37d; cursor: pointer; padding: 0 8px; font-size: 18px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <!-- 3. FOTO REDONDA CHICA EN EL BOTÓN -->
        <div class="new-chat">
            <img src="neo/imag/3.jpg" alt="Delia Panel" class="panel-avatar">
            <span class="panel-text">DeliaAI Panel</span>
        </div>

        <!-- 4. AQUÍ ABAJO APARECE LA IMAGEN GRANDE DE PRESENCIA VIVA -->
        <div class="sidebar-live-container">
            <!-- REEMPLAZA 'delia_viva.jpg' por el nombre del archivo de la imagen grande en tu carpeta -->
            <img src="neo/imag/1.jpg" alt="Delia Presencia Viva" class="sidebar-live-img">
            <div class="live-status">En Línea</div>
        </div>
    </div>
    
    <div id="chat-container">
        
        <!-- 1. FOTO DE ARRIBA (BANNER DEL CHAT) -->
        <div id="top-banner">
            <img src="neo/imag/2.jpg" alt="Delia Banner" class="banner-img">
            <div class="banner-title">DeliaAI Módulo Activo</div>
        </div>

        <div id="messages">
            <!-- 2. FOTO AVATAR LATERAL EN CADA RESPUESTA -->
            <div class="message bot">
                <img src="neo/imag/5.jpg" alt="Delia" class="avatar-lateral">
                <div class="message-content">
                    Hola DEMIAN ALEX3NDER , soy DeliaAI. ¿En qué proyecto técnico o investigación de FILTRACION Y DE CODIFICAR e restaurar el imperio EUROPEO vamos a trabajar hoy?
                </div>
            </div>
        </div>
        
        <div id="input-area">
            <div class="input-box">
                <textarea id="userInput" placeholder="Envía un mensaje..."></textarea>
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
